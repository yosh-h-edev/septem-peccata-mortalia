<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>七つの大罪ガチャ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0b14;
      --bg2: #16111f;
      --bg3: #1e1730;
      --surface: #1e1730;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.15);
      --text: #e8e0f0;
      --text2: #a090b8;
      --text3: #6a5880;
      --accent: #c9a227;
      --accent2: #9b5de5;
      --red: #e05c5c;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Text', Georgia, serif;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    /* Background decoration */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(155,93,229,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 30% at 80% 80%, rgba(201,162,39,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 660px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      text-align: center;
      padding: 2rem 0 2.5rem;
    }

    .seal {
      display: inline-block;
      width: 64px;
      height: 64px;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(18px, 5vw, 26px);
      font-weight: 900;
      letter-spacing: 0.06em;
      color: var(--accent);
      text-shadow: 0 0 40px rgba(201,162,39,0.25);
      line-height: 1.3;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text2);
      margin-top: 8px;
      font-style: italic;
    }

    /* Info bar */
    .info-bar {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 13px;
      color: var(--text2);
    }
    .info-bar strong { color: var(--text); font-weight: 600; }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .btn {
      font-family: 'Cinzel Decorative', serif;
      font-size: 13px;
      font-weight: 700;
      padding: 11px 28px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text);
      border-radius: var(--radius-sm);
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.15s, border-color 0.15s, transform 0.1s, color 0.15s;
    }

    .btn:hover {
      background: var(--surface);
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn:active { transform: scale(0.97); }
    .btn.spinning { opacity: 0.4; pointer-events: none; }

    .btn-primary {
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn-primary:hover {
      background: rgba(201,162,39,0.1);
    }

    .btn-sm {
      font-size: 11px;
      padding: 9px 16px;
      border-color: var(--border);
      color: var(--text2);
    }

    /* Spinner */
    .spin-overlay {
      display: none;
      text-align: center;
      padding: 2.5rem;
      font-style: italic;
      color: var(--text2);
      font-size: 15px;
    }
    .spin-overlay.active { display: block; }

    .spinner {
      display: inline-block;
      width: 36px;
      height: 36px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 14px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result grid */
    #result-area { display: none; }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
      margin-bottom: 2rem;
    }

    .sin-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 0.75rem;
      text-align: center;
      opacity: 0;
      transform: translateY(14px) scale(0.94);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .sin-card.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .sin-card:hover {
      border-color: var(--border2);
      background: var(--bg3);
    }

    .sin-icon {
      font-size: 30px;
      line-height: 1;
      margin-bottom: 7px;
      display: block;
    }

    .sin-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--text3);
      margin-bottom: 3px;
      text-transform: uppercase;
    }

    .sin-ja {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .sin-desc {
      font-size: 11px;
      color: var(--text2);
      font-style: italic;
      line-height: 1.4;
    }

    .count-badge {
      display: inline-block;
      margin-top: 8px;
      border-radius: 20px;
      font-size: 11px;
      padding: 2px 9px;
    }

    .count-badge.single {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text3);
    }

    .count-badge.multi {
      background: rgba(201,162,39,0.15);
      border: 1px solid rgba(201,162,39,0.35);
      color: var(--accent);
      font-weight: 600;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }

    /* Stats */
    .section-title {
      font-size: 12px;
      color: var(--text3);
      text-align: center;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: 'Cinzel Decorative', serif;
      margin-bottom: 1rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 2rem;
    }

    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: repeat(4, 1fr); }
    }

    .stat-cell {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 4px;
      text-align: center;
    }

    .stat-icon { font-size: 16px; line-height: 1; margin-bottom: 3px; }
    .stat-ja { font-size: 10px; color: var(--text2); margin-bottom: 3px; }
    .stat-count { font-size: 15px; font-weight: 600; color: var(--text); }
    .stat-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; margin-top: 5px; overflow: hidden; }
    .stat-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s ease; }

    /* History */
    .history-list { display: flex; flex-direction: column; gap: 8px; }

    .history-item {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 14px;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .history-sins {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      flex: 1;
    }

    .history-tag {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 7px;
      font-size: 11px;
      color: var(--text);
    }

    .history-num {
      font-size: 11px;
      color: var(--text3);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text3);
      font-style: italic;
      font-size: 16px;
      line-height: 2;
    }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 3rem;
      font-size: 11px;
      color: var(--text3);
      font-style: italic;
    }

    /* ===== JACKPOT OVERLAY ===== */
    #jackpot-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(4px);
    }
    #jackpot-overlay.active { display: flex; }

    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1000;
    }

    .jackpot-box {
      position: relative;
      z-index: 1001;
      text-align: center;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 90%;
      background: linear-gradient(160deg, #1a1028 0%, #0e0b14 100%);
      border: 1px solid rgba(201,162,39,0.5);
      border-radius: 20px;
      box-shadow: 0 0 80px rgba(201,162,39,0.15), 0 0 120px rgba(155,93,229,0.1);
      animation: jackpot-appear 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes jackpot-appear {
      from { opacity: 0; transform: scale(0.7) rotate(-3deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .jackpot-sigil {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.25rem;
      animation: sigil-spin 8s linear infinite;
    }

    @keyframes sigil-spin { to { transform: rotate(360deg); } }

    .jackpot-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(20px, 5vw, 28px);
      font-weight: 900;
      color: var(--accent);
      letter-spacing: 0.06em;
      line-height: 1.2;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 30px rgba(201,162,39,0.6);
      animation: flicker 3s ease-in-out infinite;
    }

    @keyframes flicker {
      0%,100% { opacity: 1; }
      92%      { opacity: 1; }
      93%      { opacity: 0.7; }
      94%      { opacity: 1; }
      96%      { opacity: 0.8; }
      97%      { opacity: 1; }
    }

    .jackpot-latin {
      font-size: 13px;
      color: var(--accent2);
      font-style: italic;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
    }

    .jackpot-sins {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .jackpot-sin-chip {
      background: rgba(201,162,39,0.1);
      border: 1px solid rgba(201,162,39,0.3);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      color: var(--accent);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .jackpot-sin-chip.show { opacity: 1; transform: translateY(0); }

    .jackpot-msg {
      font-size: 15px;
      color: var(--text2);
      font-style: italic;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .jackpot-close {
      font-family: 'Cinzel Decorative', serif;
      font-size: 12px;
      font-weight: 700;
      padding: 10px 28px;
      border: 1px solid rgba(201,162,39,0.4);
      background: transparent;
      color: var(--accent);
      border-radius: var(--radius-sm);
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.15s;
    }
    .jackpot-close:hover { background: rgba(201,162,39,0.1); }

    /* jackpot glow on result cards */
    .sin-card.jackpot-glow {
      border-color: rgba(201,162,39,0.5);
      box-shadow: 0 0 18px rgba(201,162,39,0.15);
    }

    /* history badge for complete */
    .history-complete-badge {
      display: inline-block;
      background: rgba(201,162,39,0.15);
      border: 1px solid rgba(201,162,39,0.35);
      color: var(--accent);
      font-size: 10px;
      border-radius: 4px;
      padding: 1px 6px;
      margin-left: 6px;
      vertical-align: middle;
      font-family: 'Cinzel Decorative', serif;
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <svg class="seal" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <polygon points="32,4 38,22 58,22 43,34 49,52 32,40 15,52 21,34 6,22 26,22" fill="none" stroke="#c9a227" stroke-width="1.2" opacity="0.6"/>
      <circle cx="32" cy="32" r="12" fill="none" stroke="#9b5de5" stroke-width="0.8" opacity="0.5"/>
      <text x="32" y="37" text-anchor="middle" font-size="13" fill="#c9a227" font-family="serif">✦</text>
    </svg>
    <h1>七つの大罪ガチャ</h1>
    <p class="subtitle">重複あり・7枠 — あなたに宿る罪の組み合わせを占う</p>
  </header>

  <div class="info-bar">
    <div>ガチャ回数: <strong id="total-count">0</strong> 回</div>
    <div>最多出現: <strong id="most-sin">—</strong></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="btn-gacha" onclick="doGacha()">ガチャを引く</button>
    <button class="btn btn-sm" onclick="clearHistory()">リセット</button>
  </div>

  <div class="spin-overlay" id="spin-overlay">
    <div class="spinner"></div><br>罪を召喚中...
  </div>

  <div id="result-area">
    <div class="result-grid" id="result-grid"></div>
  </div>

  <div id="empty-state" class="empty-state">
    ボタンを押して<br>あなたの罪を引き当てよう
  </div>

  <div id="stats-section" style="display:none;">
    <div class="divider"></div>
    <div class="section-title">累計出現回数</div>
    <div class="stats-grid" id="stats-grid"></div>
  </div>

  <div id="history-section" style="display:none;">
    <div class="divider"></div>
    <div class="section-title">履歴</div>
    <div class="history-list" id="history-list"></div>
  </div>

  <footer>Septem Peccata Mortalia — Seven Deadly Sins Gacha</footer>
</div>

<!-- JACKPOT OVERLAY -->
<canvas id="confetti-canvas"></canvas>
<div id="jackpot-overlay">
  <div class="jackpot-box">
    <svg class="jackpot-sigil" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <circle cx="40" cy="40" r="36" fill="none" stroke="#c9a227" stroke-width="0.8" opacity="0.4"/>
      <polygon points="40,6 46,27 68,27 51,40 57,62 40,49 23,62 29,40 12,27 34,27" fill="none" stroke="#c9a227" stroke-width="1"/>
      <circle cx="40" cy="40" r="14" fill="none" stroke="#9b5de5" stroke-width="0.8" opacity="0.6"/>
      <polygon points="40,27 43,36 53,36 45,42 48,51 40,45 32,51 35,42 27,36 37,36" fill="#c9a227" opacity="0.7"/>
    </svg>
    <div class="jackpot-title">大当たり</div>
    <div class="jackpot-latin">Omnia Peccata — All Sins Collected</div>
    <div class="jackpot-sins" id="jackpot-sins"></div>
    <div class="jackpot-msg">
      七つの大罪すべてを一度に引き当てた。<br>
      あなたは完全なる罪人である。
    </div>
    <button class="jackpot-close" onclick="closeJackpot()">閉じる</button>
  </div>
</div>

<script>
const SINS = [
  { id: 'pride',    ja: '傲慢', en: 'Superbia',  icon: '👑', desc: '慢心・自己過信' },
  { id: 'greed',    ja: '強欲', en: 'Avaritia',  icon: '💰', desc: '際限なき欲望' },
  { id: 'lust',     ja: '色欲', en: 'Luxuria',   icon: '🌹', desc: '肉欲・過度な欲求' },
  { id: 'envy',     ja: '嫉妬', en: 'Invidia',   icon: '🐍', desc: '他者への羨望' },
  { id: 'gluttony', ja: '暴食', en: 'Gula',      icon: '🍷', desc: '過食・放縦' },
  { id: 'wrath',    ja: '憤怒', en: 'Ira',       icon: '🔥', desc: '怒り・暴力衝動' },
  { id: 'sloth',    ja: '怠惰', en: 'Acedia',    icon: '🌙', desc: '無気力・消極' }
];

let totalCount = 0;
let sinCounts = {};
let history = [];

try {
  totalCount = parseInt(localStorage.getItem('gacha_total')) || 0;
  sinCounts = JSON.parse(localStorage.getItem('gacha_counts') || '{}');
  history = JSON.parse(localStorage.getItem('gacha_history') || '[]');
  updateInfoBar();
  if (history.length > 0) {
    document.getElementById('empty-state').style.display = 'none';
    renderStats();
    renderHistory();
  }
} catch(e) {}

function isComplete(drawn) {
  const ids = new Set(drawn.map(s => s.id));
  return ids.size === 7;
}

function doGacha() {
  const btn = document.getElementById('btn-gacha');
  btn.classList.add('spinning');
  document.getElementById('spin-overlay').classList.add('active');
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('empty-state').style.display = 'none';

  setTimeout(() => {
    const drawn = Array.from({length: 7}, () => SINS[Math.floor(Math.random() * 7)]);
    const counts = {};
    drawn.forEach(s => {
      counts[s.id] = (counts[s.id] || 0) + 1;
      sinCounts[s.id] = (sinCounts[s.id] || 0) + 1;
    });

    const complete = isComplete(drawn);
    totalCount++;
    history.unshift({
      sins: drawn.map(s => s.id),
      ts: new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'}),
      complete
    });
    if (history.length > 10) history = history.slice(0, 10);

    try {
      localStorage.setItem('gacha_total', totalCount);
      localStorage.setItem('gacha_counts', JSON.stringify(sinCounts));
      localStorage.setItem('gacha_history', JSON.stringify(history));
    } catch(e) {}

    document.getElementById('spin-overlay').classList.remove('active');
    btn.classList.remove('spinning');

    renderResult(drawn, counts, complete);
    updateInfoBar();
    renderStats();
    renderHistory();

    if (complete) {
      // 少し遅らせてカード演出の後にオーバーレイ表示
      setTimeout(() => showJackpot(drawn), 900);
    }
  }, 900);
}

function renderResult(drawn, counts, complete) {
  const grid = document.getElementById('result-grid');
  grid.innerHTML = '';
  drawn.forEach((sin, i) => {
    const c = counts[sin.id];
    const card = document.createElement('div');
    card.className = 'sin-card' + (complete ? ' jackpot-glow' : '');
    card.innerHTML = `
      <span class="sin-icon">${sin.icon}</span>
      <div class="sin-name">${sin.en}</div>
      <div class="sin-ja">${sin.ja}</div>
      <div class="sin-desc">${sin.desc}</div>
      <span class="count-badge single">✓</span>
    `;
    grid.appendChild(card);
    setTimeout(() => card.classList.add('show'), 80 + i * 70);
  });
  document.getElementById('result-area').style.display = 'block';
}

function renderStats() {
  document.getElementById('stats-section').style.display = 'block';
  const grid = document.getElementById('stats-grid');
  const max = Math.max(1, ...SINS.map(s => sinCounts[s.id] || 0));
  grid.innerHTML = SINS.map(sin => {
    const cnt = sinCounts[sin.id] || 0;
    const pct = Math.round((cnt / max) * 100);
    return `<div class="stat-cell">
      <div class="stat-icon">${sin.icon}</div>
      <div class="stat-ja">${sin.ja}</div>
      <div class="stat-count">${cnt}</div>
      <div class="stat-bar-wrap"><div class="stat-bar" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function renderHistory() {
  const sec = document.getElementById('history-section');
  if (!history.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  document.getElementById('history-list').innerHTML = history.map((item, idx) => {
    const tags = item.sins.map(id => {
      const s = SINS.find(x => x.id === id);
      return `<span class="history-tag">${s.icon} ${s.ja}</span>`;
    }).join('');
    const badge = item.complete
      ? `<span class="history-complete-badge">★ 大当たり</span>` : '';
    return `<div class="history-item">
      <div class="history-sins">${tags}${badge}</div>
      <span class="history-num">#${totalCount - idx} · ${item.ts}</span>
    </div>`;
  }).join('');
}

function updateInfoBar() {
  document.getElementById('total-count').textContent = totalCount;
  const top = Object.entries(sinCounts).sort((a,b) => b[1]-a[1])[0];
  if (top) {
    const s = SINS.find(x => x.id === top[0]);
    document.getElementById('most-sin').textContent = s ? `${s.icon} ${s.ja}` : '—';
  }
}

function clearHistory() {
  if (!confirm('履歴とカウントをリセットしますか？')) return;
  totalCount = 0; sinCounts = {}; history = [];
  try {
    ['gacha_total','gacha_counts','gacha_history'].forEach(k => localStorage.removeItem(k));
  } catch(e) {}
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('stats-section').style.display = 'none';
  document.getElementById('history-section').style.display = 'none';
  document.getElementById('empty-state').style.display = 'block';
  updateInfoBar();
}

/* ===== JACKPOT ===== */
let confettiAF = null;

function showJackpot(drawn) {
  // シンチップを順番に表示
  const container = document.getElementById('jackpot-sins');
  container.innerHTML = '';
  SINS.forEach((sin, i) => {
    const chip = document.createElement('div');
    chip.className = 'jackpot-sin-chip';
    chip.textContent = sin.icon + ' ' + sin.ja;
    container.appendChild(chip);
    setTimeout(() => chip.classList.add('show'), 200 + i * 80);
  });

  document.getElementById('jackpot-overlay').classList.add('active');
  startConfetti();
}

function closeJackpot() {
  document.getElementById('jackpot-overlay').classList.remove('active');
  stopConfetti();
}

// クリックで閉じる
document.getElementById('jackpot-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeJackpot();
});

/* ===== CONFETTI ENGINE ===== */
function startConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const COLORS = ['#c9a227','#9b5de5','#e05c5c','#5de5b8','#e8e0f0','#f5a623','#7b68ee'];
  const pieces = Array.from({length: 120}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * -canvas.height,
    w: 6 + Math.random() * 8,
    h: 3 + Math.random() * 4,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    rot: Math.random() * Math.PI * 2,
    rotV: (Math.random() - 0.5) * 0.12,
    vx: (Math.random() - 0.5) * 2,
    vy: 2 + Math.random() * 3,
    opacity: 0.8 + Math.random() * 0.2
  }));

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.opacity;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();

      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.rotV;
      if (p.y > canvas.height + 20) {
        p.y = -20;
        p.x = Math.random() * canvas.width;
      }
    });
    confettiAF = requestAnimationFrame(draw);
  }
  draw();
}

function stopConfetti() {
  if (confettiAF) { cancelAnimationFrame(confettiAF); confettiAF = null; }
  const canvas = document.getElementById('confetti-canvas');
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

window.addEventListener('resize', () => {
  const canvas = document.getElementById('confetti-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
